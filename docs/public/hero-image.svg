<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#bd34fe;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#41d1ff;stop-opacity:0.2" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#heroGrad)" rx="20"/>
  <g transform="translate(150, 100)">
    <circle cx="50" cy="50" r="45" fill="url(#heroGrad)" stroke="#bd34fe" stroke-width="3"/>
    <text x="50" y="62" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#bd34fe" text-anchor="middle">TC</text>
  </g>
  <!-- Agent nodes -->
  <circle cx="80" cy="200" r="20" fill="#41d1ff" opacity="0.8"/>
  <circle cx="150" cy="230" r="20" fill="#bd34fe" opacity="0.8"/>
  <circle cx="220" cy="200" r="20" fill="#41d1ff" opacity="0.8"/>
  <circle cx="290" cy="230" r="20" fill="#bd34fe" opacity="0.8"/>
  <circle cx="320" cy="180" r="20" fill="#41d1ff" opacity="0.8"/>
  <!-- Connection lines -->
  <line x1="200" y1="150" x2="80" y2="180" stroke="#888" stroke-width="2" stroke-dasharray="5,5"/>
  <line x1="200" y1="150" x2="150" y2="210" stroke="#888" stroke-width="2" stroke-dasharray="5,5"/>
  <line x1="200" y1="150" x2="220" y2="180" stroke="#888" stroke-width="2" stroke-dasharray="5,5"/>
  <line x1="200" y1="150" x2="290" y2="210" stroke="#888" stroke-width="2" stroke-dasharray="5,5"/>
  <line x1="200" y1="150" x2="320" y2="160" stroke="#888" stroke-width="2" stroke-dasharray="5,5"/>
</svg>
